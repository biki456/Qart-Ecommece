{% extends 'auth/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 p-8 bg-white rounded-lg shadow-md">
  <h2 class="text-2xl font-bold mb-6 text-center">Login to Your Account</h2>

  {% if messages %}
  {% for message in messages %}
  <div class="mb-4 p-3 rounded {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
  {% endif %}

  <form method="post" action="{% url 'login' %}" autocomplete="off">
    {% csrf_token %}

    <label for="username" class="block text-gray-700 font-semibold mb-2">Username</label>
    <input
      type="text"
      id="username"
      name="username"
      required
      placeholder="Enter your username"
      autocomplete="off"
      class="w-full px-4 py-2 mb-4 border rounded-md focus:outline-none focus:ring-2 focus:ring-gray-900"
    />

    <label for="password" class="block text-gray-700 font-semibold mb-2">Password</label>
    <input
      type="password"
      id="password"
      name="password"
      required
      placeholder="Enter your password"
      autocomplete="new-password"
      class="w-full px-4 py-2 mb-6 border rounded-md focus:outline-none focus:ring-2 focus:ring-gray-900"
    />

    <button
      type="submit"
      class="w-full py-3 bg-gray-900 text-white rounded-md hover:bg-black transition duration-200"
    >
      Login
    </button>
  </form>

  <p class="mt-4 text-center text-gray-600">
    Don't have an account?
    <a href="{% url 'register' %}" class="text-blue-600 hover:underline">Register here</a>
  </p>
</div>
{% endblock %}
