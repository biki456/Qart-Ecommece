{% extends 'shop/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto p-6 bg-white rounded-lg shadow-md mt-10">
  <h1 class="text-3xl font-bold mb-4">Welcome, {{ username }}!</h1>

  <p class="mb-6 text-gray-700">Manage your account and view your activity below.</p>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

    <a href="{% url 'cart' %}" class="block p-4 border rounded-md hover:bg-gray-100 transition">
      <h2 class="text-xl font-semibold mb-1">Cart</h2>
      <p class="text-gray-600">View your cart</p>
    </a>


    <a href="{% url 'logout' %}" class="block p-4 border rounded-md hover:bg-gray-100 transition text-red-600 font-semibold">
      <h2 class="text-xl font-semibold mb-1">Logout</h2>
      <p class="text-gray-600">Sign out of your account safely.</p>
    </a>

        <a href="{% url 'password' %}" class="block p-4 border rounded-md hover:bg-gray-100 transition text-red-600 font-semibold">
      <h2 class="text-xl font-semibold mb-1">password Change</h2>
      <p class="text-gray-600">Update your Password .</p>
    </a>
  </div>
</div>
{% endblock %}
