{% extends 'auth/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 p-8 bg-white rounded-lg shadow-md">
  <h2 class="text-2xl font-bold mb-6 text-center">Create a New Account</h2>
  
  {% if form.errors %}
  <div class="mb-4 p-3 rounded bg-red-100 text-red-700">
    {% for field, errors in form.errors.items %}
      {% for error in errors %}
        <p>{{ error }}</p>
      {% endfor %}
    {% endfor %}
  </div>
  {% endif %}

  <form method="post" action="{% url 'register' %}">
    {% csrf_token %}
    
    <label for="username" class="block text-gray-700 font-semibold mb-2">Username</label>
    <input
      type="text"
      id="username"
      name="username"
      required
      placeholder="Choose a username"
      class="w-full px-4 py-2 mb-4 border rounded-md focus:outline-none focus:ring-2 focus:ring-gray-900"
    />

    <label for="email" class="block text-gray-700 font-semibold mb-2">Email Address</label>
    <input
      type="email"
      id="email"
      name="email"
      placeholder="Enter your email"
      class="w-full px-4 py-2 mb-4 border rounded-md focus:outline-none focus:ring-2 focus:ring-gray-900"
    />

    <label for="password1" class="block text-gray-700 font-semibold mb-2">Password</label>
    <input
      type="password"
      id="password1"
      name="password1"
      required
      placeholder="Create a password"
      class="w-full px-4 py-2 mb-4 border rounded-md focus:outline-none focus:ring-2 focus:ring-gray-900"
    />

    <label for="password2" class="block text-gray-700 font-semibold mb-2">Confirm Password</label>
    <input
      type="password"
      id="password2"
      name="password2"
      required
      placeholder="Confirm your password"
      class="w-full px-4 py-2 mb-6 border rounded-md focus:outline-none focus:ring-2 focus:ring-gray-900"
    />

    <button
      type="submit"
      class="w-full py-3 bg-gray-900 text-white rounded-md hover:bg-black transition duration-200"
    >
      Register
    </button>
  </form>

  <p class="mt-4 text-center text-gray-600">
    Already have an account?
    <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Login here</a>
  </p>
</div>
{% endblock %}
